product_title:
    css: 'a[data-hook="product-link"]'
    type: Text
reviews:
    css: 'div[data-hook="review"]'
    multiple: true
    type: Text
    children:
        title:
            css: 'a[data-hook="review-title"] span'
            type: Text
        content:
            css: 'span[data-hook="review-body"] span'
            type: Text
        date:
            css: 'span[data-hook="review-date"]'
            type: Text
        variant:
            css: 'a.a-size-mini.a-link-normal'
            type: Text
        images:
            css: 'img[data-hook="review-image-tile"]'
            multiple: true
            type: Attribute
            attribute: src
        verified:
            css: 'span[data-hook="avp-badge"]'
            type: Text
        author:
            css: span.a-profile-name
            type: Text
        rating:
            css: 'i[data-hook="review-star-rating"] span'
            type: Text
next_page:
    css: 'li.a-last a'
    type: Link
